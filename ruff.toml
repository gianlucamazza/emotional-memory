line-length = 99
target-version = "py311"

[lint]
select = [
  "E",
  "F",
  "I",
  "W",
  "UP",
  "B",
  "SIM",
  "RUF",
  "C4",
  "T20",
  "TCH",
  "PERF",
  "S",
  "PTH",
]

[lint.per-file-ignores]
# assert idiomatic in tests
"tests/**" = ["S101"]
# benchmarks: assert OK, print OK, pseudo-random for reproducibility, TCH not needed
"benchmarks/**" = ["S101", "T201", "S311", "TCH"]
# print() intentional in examples
"examples/**" = ["T201"]
# S603/S314: false positives (controlled subprocess + self-generated XML)
# S311: pseudo-random is intentional for reproducible synthetic data generation
# S306: tempfile.mktemp used for git-archive output path; file is written
#       atomically by git and removed by the script
# S607: partial executable path (`git`, `twine`) — PATH-resolved commands
#       are standard for release tooling
"scripts/**" = ["T201", "S603", "S314", "S311", "S306", "S607"]
# demo: print OK in gradio apps; TCH not needed
"demo/**" = ["T201", "TCH"]
# TCH (TYPE_CHECKING) is incompatible with Pydantic models that use
# `from __future__ import annotations` — types must be available at runtime
# for model_rebuild() to succeed.
"src/**" = ["TCH"]

[lint.isort]
known-first-party = ["emotional_memory"]
