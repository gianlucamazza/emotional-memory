    - Neuroscience: research/02_neuroscience.md
    - Computational Models: research/03_computational_models.md
    - State of the Art: research/04_state_of_art.md
    - Design Principles: research/05_design_principles.md
    - Related Work: research/07_related_work.md
    - Limitations: research/08_limitations.md
    - Current Evidence: research/09_current_evidence.md
    - Scientific Quality Bar: research/10_scientific_quality_bar.md
    - Dominance Design (implemented v0.8.2): research/11_dominance_design.md
    - Multilingual Follow-up: research/12_multilingual_followup.md
    - Audit (2026-04): research/audit_2026-04.md
    - Review Response (2026-06): research/review_response_2026-06.md
    - Problem Register (2026-06): research/problem_register_2026-06.md
    - Validation Report (2026-06): research/validation_report_2026-06.md
    - Claim Validation Matrix: research/claim_validation_matrix.md
    - Figure Inventory: research/figure_inventory.md
    - Bibliography: research/06_bibliography.md
  - Blog:
    - April 2026 Kickoff: blog/2026-04-kickoff.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
