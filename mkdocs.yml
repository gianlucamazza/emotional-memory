site_name: emotional_memory
site_description: Emotional memory for LLMs based on Affective Field Theory
site_url: https://gianlucamazza.github.io/emotional-memory
repo_url: https://github.com/gianlucamazza/emotional-memory
repo_name: gianlucamazza/emotional-memory

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search
  - include-markdown:
      # SSOT-friendly: the positioning hero in docs/index.md is sourced
      # from the top-level README.md to avoid drift between PyPI long
      # description and the docs site landing page.
      preserve_includer_indent: false
      dedent: false
      rewrite_relative_urls: true
      heading_offset: 0
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            docstring_style: google
            merge_init_into_class: true
            show_signature_annotations: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Mental Model: mental_model.md
  - Architecture:
    - Module Overview: architecture/module-overview.md
  - Migration Guide: migration.md
  - Evaluation:
    - Comparison: comparison.md
    - Benchmarks: benchmarks.md
    - Production Readiness: production-readiness.md
  - Contributing:
    - SSOT Policy: contributing/ssot-policy.md
    - LLM Environment: contributing/llm-environment.md
  - Tutorials:
    - Async usage: tutorials/async.md
    - Persistence: tutorials/persistence.md
    - Observability: tutorials/observability.md
    - LangChain integration: tutorials/langchain.md
    - Mem0 integration: tutorials/mem0.md
    - Query routing: tutorials/query_routing.md
    - Retrieve-time query appraisal: tutorials/query_appraisal_retrieval.md
    - Custom appraisal schema: tutorials/byo_appraisal_schema.md
  - API Reference:
    - Engine (sync): api/engine.md
    - Engine (async): api/async_engine.md
    - Stores: api/stores.md
    - State Stores: api/state_stores.md
    - Embedders: api/embedders.md
    - Telemetry: api/telemetry.md
    - Appraisal: api/appraisal.md
    - Appraisal Schema: api/appraisal_schema.md
    - Query Classifier: api/query_classifier.md
    - Models: api/models.md
    - Interfaces: api/interfaces.md
    - Categorize: api/categorize.md
    - Retrieval: api/retrieval.md
    - Decay: api/decay.md
    - Resonance: api/resonance.md
    - Mood: api/mood.md
    - Affect: api/affect.md
    - State: api/state.md
