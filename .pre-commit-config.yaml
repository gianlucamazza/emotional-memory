default_install_hook_types: [pre-commit, pre-push, commit-msg]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # Self-contained ruff hook (no `uv run` dependency on host).
  # The pinned ruff binary is downloaded by pre-commit's own toolchain so
  # contributors don't need uv installed to run pre-commit locally.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.12
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # Validates that pyproject.toml is well-formed per PEP 621.
  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.23
    hooks:
      - id: validate-pyproject

  # Static analysis for GitHub Actions workflows.
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.22.0
    hooks:
      - id: zizmor

  # Conventional Commit message linting — mirrors pr-title.yml in CI.
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  # Strict type-check on push (kept off per-commit to stay fast).
  - repo: local
    hooks:
      - id: mypy-strict
        name: mypy (strict)
        entry: make typecheck
        language: system
        pass_filenames: false
        types: [python]
        stages: [pre-push]
