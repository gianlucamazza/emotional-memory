version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build(deps)"
      prefix-development: "build(deps-dev)"
    groups:
      dev-dependencies:
        patterns:
          - "pytest*"
          - "ruff"
          - "mypy"
          - "mkdocs*"
          - "mkdocstrings*"
          - "pip-audit"
          - "psutil"
          - "httpx"
      optional-extras:
        patterns:
          - "sentence-transformers"
          - "sqlite-vec"
          - "matplotlib"
          - "python-dotenv"
          - "langchain-core"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build(deps)"
    groups:
      github-actions:
        patterns:
          - "*"
