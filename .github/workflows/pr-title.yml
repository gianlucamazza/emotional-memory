name: PR Title Lint

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read

concurrency:
  group: pr-title-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    name: Conventional Commit title
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Accept the Conventional Commits standard set plus a few
          # repo-specific ones inferred from the existing CHANGELOG.
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
            release
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The PR title subject must start with a lowercase letter.
            Example: "feat(retrieval): add APE-gated reconsolidation"
          # Allow Dependabot PRs to keep their existing `build(deps):` style.
          ignoreLabels: |
            dependabot
