name: Release to PyPI

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install release dependencies
        run: uv sync --extra release

      - name: Resolve release version
        id: version
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(uv run python scripts/resolve_version.py)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Fast release preflight
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: uv run python scripts/preflight.py --fast --ci "$RELEASE_VERSION"

      - name: Build package
        run: uv build

      - name: Validate artefacts
        run: uv run python -m twine check dist/*

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest build provenance (SLSA)
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Attest SBOM (CycloneDX)
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
          predicate-type: "https://cyclonedx.org/bom"
          predicate-path: "sbom.cdx.json"

      - name: Upload release artefacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: emotional-memory-${{ steps.version.outputs.version }}-dist
          path: |
            dist/*.whl
            dist/*.tar.gz
            sbom.cdx.json

      - name: Publish to PyPI
        if: github.event_name == 'push'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          attestations: true

      - name: Verify PyPI release
        if: github.event_name == 'push'
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: uv run python scripts/verify_pypi_release.py "$RELEASE_VERSION"

      - name: Create GitHub release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Extract the matching version section from CHANGELOG.md as release notes.
          notes_file="$(mktemp)"
          awk -v ver="$RELEASE_VERSION" '
            $0 ~ ("^## \\[" ver "\\]") {grab=1; next}
            grab && /^## \[/ {exit}
            grab {print}
          ' CHANGELOG.md > "$notes_file"
          {
            echo ""
            echo "---"
            echo ""
            echo "**PyPI**: https://pypi.org/project/emotional-memory/${RELEASE_VERSION}/"
          } >> "$notes_file"
          if gh release view "v${RELEASE_VERSION}" >/dev/null 2>&1; then
            echo "::notice::GitHub release v${RELEASE_VERSION} already exists — uploading assets only"
            gh release upload "v${RELEASE_VERSION}" dist/*.whl dist/*.tar.gz --clobber
          else
            gh release create "v${RELEASE_VERSION}" \
              --title "v${RELEASE_VERSION}" \
              --notes-file "$notes_file" \
              --verify-tag \
              dist/*.whl dist/*.tar.gz
          fi

      - name: Release summary
        if: always()
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          JOB_STATUS: ${{ job.status }}
        run: |
          {
            echo "## Release workflow"
            echo "- Event: ${GITHUB_EVENT_NAME}"
            echo "- Version: ${RELEASE_VERSION}"
            echo "- Job status: ${JOB_STATUS}"
            echo "- Artefacts: uploaded to workflow artifacts (incl. SBOM)"
            echo "- Provenance: SLSA build provenance attestation generated"
            echo "- SBOM: CycloneDX attestation generated"
            if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
              echo "- PyPI path: trusted publishing + PEP 740 attestations"
              echo "- Verify locally: \`gh attestation verify <wheel> -R ${{ github.repository }}\`"
              echo "- Manual fallback: \`make publish-pypi-manual\`"
            else
              echo "- Publish step skipped for workflow_dispatch"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
