name: Release to PyPI

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          enable-cache: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install release dependencies
        run: uv pip install -e ".[release]" --system

      - name: Resolve release version
        id: version
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(uv run python scripts/resolve_version.py)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Fast release preflight
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: uv run python scripts/preflight.py --fast --ci "$RELEASE_VERSION"

      - name: Build package
        run: uv build

      - name: Validate artefacts
        run: uv run python -m twine check dist/*

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: cyclonedx-json
          output-file: dist/sbom.cdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest build provenance (SLSA)
        uses: actions/attest@281a49d4cbb0a72c9575a50d18f6deb515a11deb # v4
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Attest SBOM (CycloneDX)
        uses: actions/attest@281a49d4cbb0a72c9575a50d18f6deb515a11deb # v4
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
          predicate-type: "https://cyclonedx.org/bom"
          predicate-path: "dist/sbom.cdx.json"

      - name: Upload release artefacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: emotional-memory-${{ steps.version.outputs.version }}-dist
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/sbom.cdx.json

      - name: Publish to PyPI
        if: github.event_name == 'push'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          attestations: true

      - name: Verify PyPI release
        if: github.event_name == 'push'
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: uv run python scripts/verify_pypi_release.py "$RELEASE_VERSION"

      - name: Release summary
        if: always()
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          JOB_STATUS: ${{ job.status }}
        run: |
          {
            echo "## Release workflow"
            echo "- Event: ${GITHUB_EVENT_NAME}"
            echo "- Version: ${RELEASE_VERSION}"
            echo "- Job status: ${JOB_STATUS}"
            echo "- Artefacts: uploaded to workflow artifacts (incl. SBOM)"
            echo "- Provenance: SLSA build provenance attestation generated"
            echo "- SBOM: CycloneDX attestation generated"
            if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
              echo "- PyPI path: trusted publishing + PEP 740 attestations"
              echo "- Verify locally: \`gh attestation verify <wheel> -R ${{ github.repository }}\`"
              echo "- Manual fallback: \`make publish-pypi-manual\`"
            else
              echo "- Publish step skipped for workflow_dispatch"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
