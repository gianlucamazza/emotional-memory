name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      run_llm_tests:
        description: "Run real-LLM tests (requires LLM_API_KEY secret)"
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install dependencies
        run: uv pip install -e ".[dev]" --system

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Run tests with coverage
        run: uv run pytest --cov --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          fail_ci_if_error: false

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv pip install -e ".[dev]" --system

      - name: Type check
        run: uv run mypy src/emotional_memory/

      - name: Verify py.typed marker
        run: >
          uv run python -c "
          import importlib.resources;
          assert (importlib.resources.files('emotional_memory') / 'py.typed').is_file(),
          'py.typed marker missing'
          "

  meta-integrity:
    name: Meta / release metadata integrity
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install release dependencies
        run: uv pip install -e ".[release]" --system

      - name: Check release metadata
        run: uv run python scripts/check_release_metadata.py

      - name: Fast CI preflight
        run: uv run python scripts/preflight.py --fast --ci

  security:
    name: Security (pip-audit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Export requirements for audit
        run: uv export --extra dev --no-hashes -o /tmp/audit-requirements.txt

      - name: Install pip-audit
        run: uv pip install pip-audit --system

      - name: Audit dependencies
        run: pip-audit -r /tmp/audit-requirements.txt

  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv pip install -e ".[dev,bench]" --system

      - name: Run fidelity benchmarks
        run: uv run pytest benchmarks/fidelity/ -v

      - name: Run performance benchmarks
        run: >
          uv run pytest benchmarks/perf/
          --benchmark-only
          --benchmark-sort=mean
          --benchmark-json=benchmark-results.json

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: pytest
          output-file-path: benchmark-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: "150%"
          comment-on-alert: true
          benchmark-data-dir-path: dev/bench

  sqlite-tests:
    name: SQLite store tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv pip install -e ".[dev,sqlite]" --system

      - name: Run SQLite store tests and example smoke tests
        run: uv run pytest tests/test_sqlite_store.py tests/test_examples.py -v

  langchain-tests:
    name: LangChain adapter tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv pip install -e ".[dev,langchain]" --system

      - name: Run LangChain adapter tests
        run: uv run pytest tests/test_langchain_adapter.py -v

  sentence-transformers-tests:
    name: SentenceTransformerEmbedder tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv pip install -e ".[dev,sentence-transformers]" --system

      - name: Run SentenceTransformerEmbedder tests
        run: uv run pytest tests/test_sentence_transformers_extra.py -v

  viz-tests:
    name: Visualization tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv pip install -e ".[dev,viz]" --system

      - name: Run visualization tests
        run: uv run pytest tests/test_visualization.py -v

  dotenv-tests:
    name: Dotenv extra smoke test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv pip install -e ".[dev,dotenv]" --system

      - name: Verify python-dotenv is importable
        run: uv run python -c "from dotenv import load_dotenv; print('dotenv OK')"

      - name: Run core tests with dotenv installed
        run: uv run pytest tests/ -k "not sqlite and not visualization and not llm and not sentence_transformers" -q

  llm-tests:
    name: LLM integration + quality benchmarks
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.run_llm_tests == 'true'

    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv pip install -e ".[dev,llm-test]" --system

      - name: Validate LLM test files are importable
        run: uv run pytest --collect-only -m llm -q

      - name: Run LLM integration tests
        env:
          EMOTIONAL_MEMORY_LLM_API_KEY: ${{ secrets.EMOTIONAL_MEMORY_LLM_API_KEY }}
          EMOTIONAL_MEMORY_LLM_BASE_URL: ${{ vars.EMOTIONAL_MEMORY_LLM_BASE_URL || 'https://api.openai.com/v1' }}
          EMOTIONAL_MEMORY_LLM_MODEL: ${{ vars.EMOTIONAL_MEMORY_LLM_MODEL || 'gpt-5-mini' }}
          EMOTIONAL_MEMORY_LLM_OUTPUT_MODE: ${{ vars.EMOTIONAL_MEMORY_LLM_OUTPUT_MODE || 'plain' }}
          EMOTIONAL_MEMORY_LLM_TIMEOUT_SECONDS: ${{ vars.EMOTIONAL_MEMORY_LLM_TIMEOUT_SECONDS || '30' }}
        run: uv run pytest tests/test_llm_integration.py -v -m llm

      - name: Run appraisal quality benchmarks
        env:
          EMOTIONAL_MEMORY_LLM_API_KEY: ${{ secrets.EMOTIONAL_MEMORY_LLM_API_KEY }}
          EMOTIONAL_MEMORY_LLM_BASE_URL: ${{ vars.EMOTIONAL_MEMORY_LLM_BASE_URL || 'https://api.openai.com/v1' }}
          EMOTIONAL_MEMORY_LLM_MODEL: ${{ vars.EMOTIONAL_MEMORY_LLM_MODEL || 'gpt-5-mini' }}
          EMOTIONAL_MEMORY_LLM_OUTPUT_MODE: ${{ vars.EMOTIONAL_MEMORY_LLM_OUTPUT_MODE || 'plain' }}
          EMOTIONAL_MEMORY_LLM_TIMEOUT_SECONDS: ${{ vars.EMOTIONAL_MEMORY_LLM_TIMEOUT_SECONDS || '30' }}
          EMOTIONAL_MEMORY_LLM_REPEATS: "1"
        run: uv run pytest benchmarks/appraisal_quality/ -v -m appraisal_quality
