name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      run_llm_tests:
        description: "Run real-LLM tests (requires LLM_API_KEY secret)"
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Run tests with coverage
        run: >
          uv run python -m pytest
          --cov --cov-report=xml --cov-report=html --cov-fail-under=80
          --override-ini="addopts=-q --tb=short -m 'not llm and not appraisal_quality'"

      - name: Upload coverage HTML report
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 14

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          files: coverage.xml
          fail_ci_if_error: false

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Type check
        run: uv run mypy src/emotional_memory/

      - name: Verify py.typed marker
        run: >
          uv run python -c "
          import importlib.resources;
          assert (importlib.resources.files('emotional_memory') / 'py.typed').is_file(),
          'py.typed marker missing'
          "

  typecheck-pyright:
    name: Type check (basedpyright)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run basedpyright
        run: uv run basedpyright src/emotional_memory/

  meta-integrity:
    name: Meta / release metadata integrity
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install release dependencies
        run: uv sync --extra release

      - name: Check release metadata
        run: uv run python scripts/check_release_metadata.py

      - name: Check Python version SSOT consistency
        run: uv run python scripts/check_python_version_consistency.py

      - name: Check metadata SSOT (author, license, keywords)
        run: uv run python scripts/check_metadata_ssot.py

      - name: Fast CI preflight
        run: uv run python scripts/preflight.py --fast --ci

  security:
    name: Security (pip-audit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Export requirements for audit
        run: uv export --extra dev --no-hashes -o /tmp/audit-requirements.txt

      - name: Install pip-audit
        run: uv pip install pip-audit --system

      - name: Audit dependencies
        run: pip-audit -r /tmp/audit-requirements.txt

  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write  # benchmark-action auto-push to gh-pages branch

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --extra dev --extra bench

      - name: Run fidelity benchmarks
        run: uv run python -m pytest benchmarks/fidelity/ -v

      - name: Validate paper tables are up-to-date
        run: make reproduce-paper-check

      - name: Run performance benchmarks
        run: >
          uv run python -m pytest benchmarks/perf/
          --benchmark-only
          --benchmark-sort=mean
          --benchmark-json=benchmark-results.json

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1.22.1
        with:
          tool: pytest
          output-file-path: benchmark-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: "150%"
          comment-on-alert: true
          benchmark-data-dir-path: dev/bench

  sqlite-tests:
    name: SQLite store tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --extra dev --extra sqlite

      - name: Run SQLite store tests and example smoke tests
        run: uv run python -m pytest tests/test_sqlite_store.py tests/test_examples.py -v

  langchain-tests:
    name: LangChain adapter tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --extra dev --extra langchain

      - name: Run LangChain adapter tests
        run: uv run python -m pytest tests/test_langchain_adapter.py -v

  sentence-transformers-tests:
    name: SentenceTransformerEmbedder tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --extra dev --extra sentence-transformers

      - name: Run SentenceTransformerEmbedder tests
        run: uv run python -m pytest tests/test_sentence_transformers_extra.py -v

  viz-tests:
    name: Visualization tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --extra dev --extra viz

      - name: Run visualization tests
        run: uv run python -m pytest tests/test_visualization.py -v

  dotenv-tests:
    name: Dotenv extra smoke test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --extra dev --extra dotenv

      - name: Verify python-dotenv is importable
        run: uv run python -c "from dotenv import load_dotenv; print('dotenv OK')"

      - name: Run core tests with dotenv installed
        run: uv run python -m pytest tests/ -k "not sqlite and not visualization and not llm and not sentence_transformers" -q

  llm-tests:
    name: LLM integration + quality benchmarks
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.run_llm_tests == 'true'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --extra dev --extra llm-test

      - name: Validate LLM test files are importable
        run: uv run python -m pytest --collect-only -m llm -q

      - name: Run LLM integration tests
        env:
          EMOTIONAL_MEMORY_LLM_API_KEY: ${{ secrets.EMOTIONAL_MEMORY_LLM_API_KEY }}
          EMOTIONAL_MEMORY_LLM_BASE_URL: ${{ vars.EMOTIONAL_MEMORY_LLM_BASE_URL || 'https://api.openai.com/v1' }}
          EMOTIONAL_MEMORY_LLM_MODEL: ${{ vars.EMOTIONAL_MEMORY_LLM_MODEL || 'gpt-5-mini' }}
          EMOTIONAL_MEMORY_LLM_OUTPUT_MODE: ${{ vars.EMOTIONAL_MEMORY_LLM_OUTPUT_MODE || 'plain' }}
          EMOTIONAL_MEMORY_LLM_TIMEOUT_SECONDS: ${{ vars.EMOTIONAL_MEMORY_LLM_TIMEOUT_SECONDS || '30' }}
        run: uv run python -m pytest tests/test_llm_integration.py -v -m llm

      - name: Run appraisal quality benchmarks
        env:
          EMOTIONAL_MEMORY_LLM_API_KEY: ${{ secrets.EMOTIONAL_MEMORY_LLM_API_KEY }}
          EMOTIONAL_MEMORY_LLM_BASE_URL: ${{ vars.EMOTIONAL_MEMORY_LLM_BASE_URL || 'https://api.openai.com/v1' }}
          EMOTIONAL_MEMORY_LLM_MODEL: ${{ vars.EMOTIONAL_MEMORY_LLM_MODEL || 'gpt-5-mini' }}
          EMOTIONAL_MEMORY_LLM_OUTPUT_MODE: ${{ vars.EMOTIONAL_MEMORY_LLM_OUTPUT_MODE || 'plain' }}
          EMOTIONAL_MEMORY_LLM_TIMEOUT_SECONDS: ${{ vars.EMOTIONAL_MEMORY_LLM_TIMEOUT_SECONDS || '30' }}
          EMOTIONAL_MEMORY_LLM_REPEATS: "1"
        run: uv run python -m pytest benchmarks/appraisal_quality/ -v -m appraisal_quality
