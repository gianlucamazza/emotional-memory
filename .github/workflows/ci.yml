name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      run_llm_tests:
        description: "Run real-LLM tests (requires LLM_API_KEY secret)"
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint and format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Lint (ruff check)
        run: uv run ruff check .
      - name: Format check (ruff format)
        run: uv run ruff format --check .

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install dependencies
        run: uv sync --extra dev --extra viz

      - name: Generate all figures
        run: make figures

      - name: Run tests with coverage
        run: >
          uv run python -m pytest
          --cov --cov-report=xml --cov-report=html --cov-fail-under=80
          --override-ini="addopts=-q --tb=short -m 'not llm and not appraisal_quality'"

      - name: Upload coverage HTML report
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 14

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          files: coverage.xml
          fail_ci_if_error: false

  typecheck:
    name: Type check (mypy + basedpyright)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        # Install all optional extras whose imports appear at module/TYPE_CHECKING
        # level, so mypy and basedpyright can fully resolve all type annotations.
        # sentence-transformers and chromadb are lazy (try/except + TYPE_CHECKING)
        # but still installed here so the type checkers see zero missing-import
        # warnings; uv caches the wheels across runs.
        run: >
          uv sync --extra dev --extra viz --extra langchain --extra llm-test
          --extra qdrant --extra chroma --extra sentence-transformers
      - name: Type check (mypy)
        run: uv run mypy src/emotional_memory/
      - name: Verify py.typed marker
        run: test -f src/emotional_memory/py.typed
      - name: Type check (basedpyright)
        run: uv run basedpyright src/emotional_memory/

  meta-integrity:
    name: Meta / release metadata integrity
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install release dependencies
        run: uv sync --extra release

      - name: Check release metadata
        run: uv run python scripts/check_release_metadata.py

      - name: Check Python version SSOT consistency
        run: uv run python scripts/check_python_version_consistency.py

      - name: Check metadata SSOT (author, license, keywords)
        run: uv run python scripts/check_metadata_ssot.py

      - name: Fast CI preflight
        run: uv run python scripts/preflight.py --fast --ci

  security:
    name: Security (pip-audit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Export requirements for audit
        run: uv export --extra dev --no-hashes -o /tmp/audit-requirements.txt

      - name: Install pip-audit
        run: uv pip install pip-audit --system

      - name: Audit dependencies
        run: pip-audit -r /tmp/audit-requirements.txt

  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write  # benchmark-action auto-push to gh-pages branch

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --extra dev --extra bench

      - name: Run fidelity benchmarks
        run: uv run python -m pytest benchmarks/fidelity/ -v

      - name: Validate paper tables are up-to-date
        run: make reproduce-paper-check

      - name: Run performance benchmarks
        run: >
          uv run python -m pytest benchmarks/perf/
          --benchmark-only
          --benchmark-sort=mean
          --benchmark-json=/tmp/benchmark-results.json
          --override-ini="timeout=0"

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1.22.1
        with:
          tool: pytest
          output-file-path: /tmp/benchmark-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: "150%"
          comment-on-alert: true
          benchmark-data-dir-path: dev/bench

  extra-tests:
    name: Optional extras tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
      - name: Install all optional dependencies
        run: >
          uv sync --extra dev
          --extra sqlite --extra langchain --extra sentence-transformers
          --extra viz --extra dotenv
          --extra qdrant --extra chroma --extra redis --extra mem0 --extra otel
      - name: Generate all figures
        run: make figures
      - name: SQLite store + examples
        run: uv run python -m pytest tests/test_sqlite_store.py tests/test_examples.py -v
      - name: LangChain adapter
        run: uv run python -m pytest tests/test_langchain_adapter.py -v
      - name: SentenceTransformer embedder
        run: uv run python -m pytest tests/test_sentence_transformers_extra.py -v
      - name: Visualization
        run: uv run python -m pytest tests/test_visualization.py tests/test_figure_inventory.py -v
      - name: Verify dotenv importable
        run: uv run python -c "from dotenv import load_dotenv; print('dotenv OK')"
      - name: Full core tests with all extras present
        run: >
          uv run python -m pytest tests/ -q
          -m "not llm and not appraisal_quality"

  optional-backends-tests:
    name: Optional backend (${{ matrix.backend }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: qdrant
            test_file: tests/test_qdrant_store.py
          - backend: chroma
            test_file: tests/test_chroma_store.py
          - backend: redis
            test_file: tests/test_redis_state_store.py

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
      - name: Install ${{ matrix.backend }} extra
        run: uv sync --extra dev --extra ${{ matrix.backend }}
      - name: Run ${{ matrix.backend }} store tests
        run: uv run python -m pytest ${{ matrix.test_file }} -v

  llm-tests:
    name: LLM integration + quality benchmarks
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.run_llm_tests == 'true'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --extra dev --extra llm-test

      - name: Validate LLM test files are importable
        run: uv run python -m pytest --collect-only -m llm -q

      - name: Run LLM integration tests
        env:
          EMOTIONAL_MEMORY_LLM_API_KEY: ${{ secrets.EMOTIONAL_MEMORY_LLM_API_KEY }}
          EMOTIONAL_MEMORY_LLM_BASE_URL: ${{ vars.EMOTIONAL_MEMORY_LLM_BASE_URL || 'https://api.openai.com/v1' }}
          EMOTIONAL_MEMORY_LLM_MODEL: ${{ vars.EMOTIONAL_MEMORY_LLM_MODEL || 'gpt-5-mini' }}
          EMOTIONAL_MEMORY_LLM_OUTPUT_MODE: ${{ vars.EMOTIONAL_MEMORY_LLM_OUTPUT_MODE || 'plain' }}
          EMOTIONAL_MEMORY_LLM_TIMEOUT_SECONDS: ${{ vars.EMOTIONAL_MEMORY_LLM_TIMEOUT_SECONDS || '30' }}
        run: uv run python -m pytest tests/test_llm_integration.py -v -m llm

      - name: Run appraisal quality benchmarks
        env:
          EMOTIONAL_MEMORY_LLM_API_KEY: ${{ secrets.EMOTIONAL_MEMORY_LLM_API_KEY }}
          EMOTIONAL_MEMORY_LLM_BASE_URL: ${{ vars.EMOTIONAL_MEMORY_LLM_BASE_URL || 'https://api.openai.com/v1' }}
          EMOTIONAL_MEMORY_LLM_MODEL: ${{ vars.EMOTIONAL_MEMORY_LLM_MODEL || 'gpt-5-mini' }}
          EMOTIONAL_MEMORY_LLM_OUTPUT_MODE: ${{ vars.EMOTIONAL_MEMORY_LLM_OUTPUT_MODE || 'plain' }}
          EMOTIONAL_MEMORY_LLM_TIMEOUT_SECONDS: ${{ vars.EMOTIONAL_MEMORY_LLM_TIMEOUT_SECONDS || '30' }}
          EMOTIONAL_MEMORY_LLM_REPEATS: "1"
        run: uv run python -m pytest benchmarks/appraisal_quality/ -v -m appraisal_quality
