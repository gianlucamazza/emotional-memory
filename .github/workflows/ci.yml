name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      run_llm_tests:
        description: "Run real-LLM tests (requires LLM_API_KEY secret)"
        type: boolean
        default: false

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format)
        run: ruff format --check .

      - name: Run tests with coverage
        run: pytest --cov --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Type check
        run: mypy src/emotional_memory/

      - name: Verify py.typed marker
        run: >
          python -c "
          import importlib.resources;
          assert (importlib.resources.files('emotional_memory') / 'py.typed').is_file(),
          'py.typed marker missing'
          "

  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev,bench]"

      - name: Run fidelity benchmarks
        run: pytest benchmarks/fidelity/ -v

      - name: Run performance benchmarks
        run: >
          pytest benchmarks/perf/
          --benchmark-only
          --benchmark-sort=mean
          --benchmark-json=benchmark-results.json

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: pytest
          output-file-path: benchmark-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: "150%"
          comment-on-alert: true
          benchmark-data-dir-path: dev/bench

  sqlite-tests:
    name: SQLite store tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev,sqlite]"

      - name: Run SQLite store tests and example smoke tests
        run: pytest tests/test_sqlite_store.py tests/test_examples.py -v

  viz-tests:
    name: Visualization tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev,viz]"

      - name: Run visualization tests
        run: pytest tests/test_visualization.py -v

  dotenv-tests:
    name: Dotenv extra smoke test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev,dotenv]"

      - name: Verify python-dotenv is importable
        run: python -c "from dotenv import load_dotenv; print('dotenv OK')"

      - name: Run core tests with dotenv installed
        run: pytest tests/ -k "not sqlite and not visualization and not llm" -q

  llm-tests:
    name: LLM integration + quality benchmarks
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.run_llm_tests == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev,llm-test]"

      - name: Validate LLM test files are importable
        run: pytest --collect-only -m llm -q

      - name: Run LLM integration tests
        env:
          EMOTIONAL_MEMORY_LLM_API_KEY: ${{ secrets.EMOTIONAL_MEMORY_LLM_API_KEY }}
          EMOTIONAL_MEMORY_LLM_MODEL: ${{ vars.EMOTIONAL_MEMORY_LLM_MODEL || 'gpt-4o-mini' }}
        run: pytest tests/test_llm_integration.py -v -m llm

      - name: Run appraisal quality benchmarks
        env:
          EMOTIONAL_MEMORY_LLM_API_KEY: ${{ secrets.EMOTIONAL_MEMORY_LLM_API_KEY }}
          EMOTIONAL_MEMORY_LLM_MODEL: ${{ vars.EMOTIONAL_MEMORY_LLM_MODEL || 'gpt-4o-mini' }}
          EMOTIONAL_MEMORY_LLM_REPEATS: "1"
        run: pytest benchmarks/appraisal_quality/ -v -m appraisal_quality
