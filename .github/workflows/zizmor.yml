name: Workflows Security (zizmor)

# Static analysis for GitHub Actions workflows.
# Catches: unpinned actions, template injection, dangerous triggers,
# excessive permissions, persist-credentials issues, and more.
# Findings are uploaded to GitHub Advanced Security (Security tab).

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: zizmor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zizmor:
    name: zizmor static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          advanced-security: true
