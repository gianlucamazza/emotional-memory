name: CodeQL

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Weekly scan on Monday 06:00 UTC to catch new CVEs/queries against
    # an unchanged codebase.
    - cron: "0 6 * * 1"

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["python", "actions"]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@52485aec7be33610227643b0fe83936b8b5f061a # v3
        with:
          languages: ${{ matrix.language }}
          # security-extended adds CWE coverage beyond the default suite.
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@52485aec7be33610227643b0fe83936b8b5f061a # v3
        with:
          category: "/language:${{ matrix.language }}"
