[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "emotional_memory"
version = "0.1.0"
description = "Emotional memory library for LLMs based on Affective Field Theory"
requires-python = ">=3.11"
license = "MIT"
dependencies = ["numpy>=1.24", "pydantic>=2.0,<3"]

[project.optional-dependencies]
dev = ["pytest>=7", "ruff>=0.4"]

[tool.setuptools.packages.find]
where = ["src"]
